name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy via SSH to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy using SSH
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            # Ensure PM2 is available in non-interactive SSH shell
            export PATH=$PATH:/home/ubuntu/.nvm/versions/node/v20.20.0/bin

            # Navigate to project root
            cd /home/ubuntu/voxly

            # Enforce the canonical repository on EC2 before pulling.
            git remote set-url origin https://github.com/voxsprint/voicednut.git

            # Keep only api + bot checked out on EC2.
            # The Telegram Mini App is deployed on Vercel and must not consume EC2 memory.
            git fetch origin main
            git sparse-checkout init --cone
            git sparse-checkout set api bot
            git checkout main
            git pull --ff-only origin main
            git sparse-checkout reapply

            # Remove any stale Mini App files left over from older full-repo deployments.
            rm -rf miniapp

            # Kill PM2 daemon and delete all processes
            pm2 kill
            pm2 delete all

            # Deploy API
            cd api
            npm install
            npm run parity:providers
            pm2 startOrRestart ecosystem.config.js --env production

            # Deploy Bot
            cd ../bot
            npm install
            pm2 startOrRestart ecosystem.config.js --env production

            # Save PM2 process list
            pm2 save
