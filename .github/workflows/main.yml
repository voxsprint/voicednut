name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy via SSH to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy using SSH
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            # Ensure PM2 is available in non-interactive SSH shell
            export PATH=$PATH:/home/ubuntu/.nvm/versions/node/v20.20.0/bin

            DEPLOY_ROOT=/home/ubuntu/voxly
            RELEASES_ROOT=/home/ubuntu/voxly-releases
            RELEASE_DIR="$RELEASES_ROOT/${{ github.sha }}"
            REPO_URL=https://github.com/voxsprint/voicednut.git

            mkdir -p "$RELEASES_ROOT" "$DEPLOY_ROOT/api" "$DEPLOY_ROOT/bot"
            rm -rf "$RELEASE_DIR"

            # Build a clean sparse checkout for this exact revision so deploys do not depend
            # on any drift or local edits inside the long-lived EC2 checkout.
            git clone --filter=blob:none --no-checkout "$REPO_URL" "$RELEASE_DIR"
            cd "$RELEASE_DIR"
            git sparse-checkout init --cone
            git sparse-checkout set api bot
            git checkout --force "${{ github.sha }}"

            # Sync only the deployable server code into the live path while preserving
            # server-managed env files, logs, and installed dependencies until reinstall.
            rsync -a --delete \
              --exclude='.env' \
              --exclude='.env.*' \
              --exclude='node_modules' \
              --exclude='logs' \
              "$RELEASE_DIR/api/" "$DEPLOY_ROOT/api/"
            rsync -a --delete \
              --exclude='.env' \
              --exclude='.env.*' \
              --exclude='node_modules' \
              --exclude='logs' \
              "$RELEASE_DIR/bot/" "$DEPLOY_ROOT/bot/"

            # Remove any stale Mini App files left over from older full-repo deployments.
            rm -rf "$DEPLOY_ROOT/miniapp"

            # Kill PM2 daemon and delete all processes
            pm2 kill
            pm2 delete all

            # Deploy API
            cd "$DEPLOY_ROOT/api"
            npm install
            npm run parity:providers
            pm2 startOrRestart ecosystem.config.js --env production

            # Deploy Bot
            cd "$DEPLOY_ROOT/bot"
            npm install
            pm2 startOrRestart ecosystem.config.js --env production

            # Save PM2 process list
            pm2 save

            # Keep only the most recent release snapshots.
            ls -1dt "$RELEASES_ROOT"/* 2>/dev/null | tail -n +4 | xargs -r rm -rf
